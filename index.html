<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shopee Review Analyzer</title>
  <style>
    body { font-family: system-ui; padding: 16px; max-width: 600px; margin: auto; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; font-size: 16px; }
    #result { background: #f5f5f5; padding: 12px; border-radius: 8px; margin-top: 16px; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h2>🛒 Shopee Review Analyzer</h2>

  <input id="url" placeholder="Paste Shopee URL">
  <button onclick="analyze()">Analyze Reviews</button>

  <!-- Tabs -->
  <div style="margin-top:20px;">
    <button onclick="showTab('sentiment')">📊 Sentiment</button>
    <button onclick="showTab('authenticity')">🛡️ Authenticity</button>
    <button onclick="showTab('summary')">🧠 AI Summary</button>
  </div>

  <!-- Tab Contents -->
  <div id="sentiment" class="tab">
    <canvas id="sentimentChart"></canvas>
  </div>

  <div id="authenticity" class="tab" style="display:none;">
    <canvas id="authChart"></canvas>
  </div>

  <div id="summary" class="tab" style="display:none;">
    <div id="summaryText"></div>
  </div>
  <button onclick="loadHistory()">📜 View History</button>
  <div id="history"></div>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    const API_URL = "https://flummoxedly-summerly-tenisha.ngrok-free.dev";

    let deviceId = localStorage.getItem("device_id");

    if (!deviceId) {
      deviceId = crypto.randomUUID();
      localStorage.setItem("device_id", deviceId);
    }
    
    let sentimentChart, authChart;
    
    
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
      document.getElementById(tab).style.display = 'block';
    }
    async function loadHistory() {
      const res = await fetch(`${API_URL}/history?device_id=${deviceId}`);
      const data = await res.json();
    
      console.log("Device ID:", deviceId);
      console.log("History data:", data); 
    
      const container = document.getElementById("history");
      container.innerHTML = "<h3>History</h3>";
    
      data.forEach(item => {
        const div = document.createElement("div");
        div.style.padding = "10px";
        div.style.marginBottom = "8px";
        div.style.background = "#eee";
        div.style.borderRadius = "6px";
    
        div.innerHTML = `
          <b>${item.product_name || "Unknown Product"}</b><br>
          ${item.dominant_type} • ${item.total_reviews} reviews<br>
          <small>${item.timestamp}</small>
        `;
    
        container.appendChild(div);
      });
    }
    async function analyze() {
      const url = document.getElementById('url').value;

      const res = await fetch(`${API_URL}/analyze`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
          url,
          device_id: deviceId
        })
      });

      const data = await res.json();

      // ---- SENTIMENT PIE ----
      const sentiment = data.sentiment_distribution || {};
      const sData = [
        sentiment["Positive"] || 0,
        sentiment["Negative"] || 0,
        sentiment["Neutral/Mixed"] || 0
      ];

      if (sentimentChart) sentimentChart.destroy();

      sentimentChart = new Chart(document.getElementById('sentimentChart'), {
        type: 'pie',
        data: {
          labels: ['Positive', 'Negative', 'Neutral/Mixed'],
          datasets: [{
            data: sData,
            backgroundColor: ['#4CAF50', '#F44336', '#FFC107']
          }]
        }
      });

      // ---- AUTHENTICITY BAR ----
      const spam = data.spam_count || 0;
      const inauth = data.inauthentic_count || 0;
      const authentic = data.total_reviews - spam - inauth;

      if (authChart) authChart.destroy();

      authChart = new Chart(document.getElementById('authChart'), {
        type: 'bar',
        data: {
          labels: ['Spam', 'Inauthentic', 'Authentic'],
          datasets: [{
            label: 'Review Count',
            data: [spam, inauth, authentic],
            backgroundColor: ['#9E9E9E', '#FF5722', '#2196F3']
          }]
        }
      });

      // ---- SUMMARY ----
      document.getElementById('summaryText').innerText = data.summary;
    }
  </script>
</body>
</html>
