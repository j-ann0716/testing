<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shopee Review Analyzer</title>

  <style>
    body {
      font-family: system-ui;
      padding: 16px;
      max-width: 700px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
    }

    button:disabled {
      background: #ccc;
    }

    .card {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .tab { margin-top: 15px; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #ccc;
    }

    th { background: #ddd; }

    #queueInfo {
      margin-top: 10px;
      font-weight: bold;
      color: #444;
    }
  </style>
</head>

<body>

<div id="mainPage">
  <h2>Shopee Review Analyzer</h2>

  <input id="url" placeholder="Paste Shopee URL">
  <button id="analyzeBtn" onclick="analyze()">Analyze Reviews</button>

  <div id="queueInfo"></div>

  <div id="resultSection" style="display:none; margin-top:20px;">
    <div>
      <button onclick="showTab('sentiment')">Sentiment</button>
      <button onclick="showTab('authenticity')">Authenticity</button>
      <button onclick="showTab('summary')">AI Summary</button>
    </div>

    <div id="sentiment" class="tab">
      <canvas id="sentimentChart"></canvas>
    </div>

    <div id="authenticity" class="tab" style="display:none;">
      <canvas id="authChart"></canvas>
    </div>

    <div id="summary" class="tab" style="display:none;">
      <div id="summaryText"></div>
    </div>

    <div id="reviewSection"></div>
  </div>

  <button onclick="loadHistory()">View History</button>
  <div id="history"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const API_URL = "https://flummoxedly-summerly-tenisha.ngrok-free.dev";

let deviceId = localStorage.getItem("device_id");
if (!deviceId) {
  deviceId = crypto.randomUUID();
  localStorage.setItem("device_id", deviceId);
}

let sentimentChart, authChart;

let countdownInterval = null;
let pollingActive = false;

// =========================
// ANALYZE
// =========================
async function analyze() {
  const url = document.getElementById('url').value;
  const btn = document.getElementById("analyzeBtn");

  btn.disabled = true;
  document.getElementById("queueInfo").innerText = "Submitting job...";

  const res = await fetch(`${API_URL}/analyze`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ url, device_id: deviceId })
  });

  const data = await res.json();
  const jobId = data.job_id;

  startQueueDisplay(data.queue_position, data.estimated_wait_seconds);

  pollingActive = true;
  pollStatus(jobId);
}

// =========================
// POLLING (FIXED)
// =========================
async function pollStatus(jobId) {
  if (!pollingActive) return;

  const res = await fetch(`${API_URL}/status?job_id=${jobId}`);
  const data = await res.json();

  // 🔥 ALWAYS UPDATE QUEUE INFO FROM BACKEND
  if (data.queue_position > 0 && data.status !== "done") {
    document.getElementById("queueInfo").innerText =
      `You are #${data.queue_position} in queue | Est wait: ${Math.ceil(data.estimated_wait_seconds / 60)} min`;
  }

  if (data.status === "done") {
    pollingActive = false;

    clearInterval(countdownInterval);

    document.getElementById("queueInfo").innerText = "✅ Done!";
    document.getElementById("analyzeBtn").disabled = false;

    showResult(data.result);
    return;
  }

  if (data.status === "processing") {
    document.getElementById("queueInfo").innerText = "🔄 Processing...";
  }

  setTimeout(() => pollStatus(jobId), 2000);
}

// =========================
// QUEUE TIMER (VISUAL ONLY)
// =========================
function startQueueDisplay(position, seconds) {
  let remaining = seconds;

  updateQueueText(position, remaining);

  clearInterval(countdownInterval);

  countdownInterval = setInterval(() => {
    if (!pollingActive) {
      clearInterval(countdownInterval);
      return;
    }

    remaining--;

    if (remaining <= 0) {
      clearInterval(countdownInterval);
      document.getElementById("queueInfo").innerText =
        "🔄 Almost done... finalizing result";
      return;
    }

    updateQueueText(position, remaining);
  }, 1000);
}

function updateQueueText(position, seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;

  document.getElementById("queueInfo").innerText =
    `You are #${position} in queue | Estimated wait: ${mins}m ${secs}s`;
}

// =========================
// RESULT
// =========================
function showResult(data) {
  document.getElementById("resultSection").style.display = "block";
  document.getElementById("summaryText").innerText = data.summary;

  renderCharts(data);
  renderReviewTable(data.reviews);

  showTab("summary");
}

// =========================
// CHARTS
// =========================
function renderCharts(data) {
  const sentiment = data.sentiment_distribution || {};

  const sData = [
    sentiment["Positive"] || 0,
    sentiment["Negative"] || 0,
    sentiment["Neutral/Mixed"] || 0
  ];

  if (sentimentChart) sentimentChart.destroy();

  sentimentChart = new Chart(document.getElementById('sentimentChart'), {
    type: 'pie',
    data: {
      labels: ['Positive', 'Negative', 'Neutral/Mixed'],
      datasets: [{ data: sData }]
    }
  });

  const spam = data.spam_count || 0;
  const inauth = data.inauthentic_count || 0;
  const authentic = data.total_reviews - spam - inauth;

  if (authChart) authChart.destroy();

  authChart = new Chart(document.getElementById('authChart'), {
    type: 'bar',
    data: {
      labels: ['Spam', 'Inauthentic', 'Authentic'],
      datasets: [{
        label: 'Review Count',
        data: [spam, inauth, authentic]
      }]
    }
  });
}

// =========================
// TABLE
// =========================
function renderReviewTable(reviews) {
  const container = document.getElementById("reviewSection");

  if (!reviews || reviews.length === 0) {
    container.innerHTML = "No review data.";
    return;
  }

  let html = `
    <h3>Review Details</h3>
    <table>
      <thead>
        <tr>
          <th>Review</th>
          <th>Rate</th>
          <th>Sentiment</th>
          <th>Authenticity</th>
        </tr>
      </thead>
      <tbody>
  `;

  reviews.forEach(r => {
    html += `
      <tr>
        <td>${r.comment || ""}</td>
        <td>${r.rating || "-"}</td>
        <td>${r.sentiment || "-"}</td>
        <td>${r.inauthentic ? "Inauthentic" : "Authentic"}</td>
      </tr>
    `;
  });

  html += "</tbody></table>";
  container.innerHTML = html;
}

// =========================
// TAB
// =========================
function showTab(tab) {
  ["sentiment", "authenticity", "summary"].forEach(id => {
    document.getElementById(id).style.display = "none";
  });
  document.getElementById(tab).style.display = "block";
}
</script>

</body>
</html>
