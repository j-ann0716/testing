<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shopee Review Analyzer</title>

  <style>
    body {
      font-family: system-ui;
      padding: 16px;
      max-width: 700px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
    }

    .card {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .tab {
      margin-top: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #ccc;
      text-align: left;
    }

    th {
      background: #ddd;
    }
  </style>
</head>

<body>

<div id="mainPage">
  <h2>Shopee Review Analyzer</h2>

  <input id="url" placeholder="Paste Shopee URL">
  <button onclick="analyze()">Analyze Reviews</button>
  
  <div id="resultSection" style="display:none; margin-top:20px;">
  
    <div>
      <button onclick="showTab('sentiment')">Sentiment</button>
      <button onclick="showTab('authenticity')">Authenticity</button>
      <button onclick="showTab('summary')">AI Summary</button>
    </div>
  
    <div id="sentiment" class="tab">
      <canvas id="sentimentChart"></canvas>
    </div>
  
    <div id="authenticity" class="tab" style="display:none;">
      <canvas id="authChart"></canvas>
    </div>
  
    <div id="summary" class="tab" style="display:none;">
      <div id="summaryText"></div>
    </div>
  
    <div id="reviewSection"></div>
  </div>
  
  <button onclick="loadHistory()">View History</button>
  <div id="history"></div>
</div>

<div id="detailPage" style="display:none;">
  <button onclick="goBack()">Back</button>

  <h2 id="detailTitle"></h2>
  <a id="detailLink" target="_blank"></a>

  <div style="margin-top:20px;">
    <button onclick="showTab('sentiment','detail')">Sentiment</button>
    <button onclick="showTab('authenticity','detail')">Authenticity</button>
    <button onclick="showTab('summary','detail')">AI Summary</button>
  </div>

  <!-- DETAIL PAGE -->
  <div id="sentimentDetail" class="tab">
    <canvas id="sentimentChartDetail"></canvas>
  </div>
  
  <div id="authenticityDetail" class="tab" style="display:none;">
    <canvas id="authChartDetail"></canvas>
  </div>
  
  <div id="summaryDetail" class="tab" style="display:none;">
    <div id="summaryTextDetail"></div>
  </div>
  
  <div id="reviewSectionDetail"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const API_URL = "https://flummoxedly-summerly-tenisha.ngrok-free.dev";

let deviceId = localStorage.getItem("device_id");
if (!deviceId) {
  deviceId = crypto.randomUUID();
  localStorage.setItem("device_id", deviceId);
}

let sentimentChart, authChart;

function showTab(tab, mode = "main") {
  const prefix = mode === "detail" ? "Detail" : "";

  const tabs = mode === "detail"
    ? ["sentimentDetail", "authenticityDetail", "summaryDetail"]
    : ["sentiment", "authenticity", "summary"];

  tabs.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = "none";
  });

  const target = document.getElementById(tab + prefix);
  if (target) target.style.display = "block";
}

function goToDetailPage() {
  document.getElementById("mainPage").style.display = "none";
  document.getElementById("detailPage").style.display = "block";
}

function goBack() {
  document.getElementById("detailPage").style.display = "none";
  document.getElementById("mainPage").style.display = "block";

  // Optional reset
  document.getElementById("resultSection").style.display = "none";
}

async function loadHistory() {
  const container = document.getElementById("history");
  container.innerHTML = "Loading...";

  try {
    const res = await fetch(`/api/proxy_history?device_id=${deviceId}`);
    const data = await res.json();

    if (!data.length) {
      container.innerHTML = "No history found.";
      return;
    }

    container.innerHTML = "<h3>History</h3>";

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${item.product_name || "Unknown Product"}</b><br>
        Dominant: ${item.dominant_type} | Reviews: ${item.total_reviews}<br>
        <small>${new Date(item.timestamp).toLocaleString()}</small>
      `;

      div.onclick = () => openHistoryItem(item.session_id);

      container.appendChild(div);
      console.log("HISTORY ITEM:", item);
    });
    

  } catch (err) {
    container.innerHTML = "Failed to load history.";
  }
}

async function analyze() {
  const url = document.getElementById('url').value;

  const res = await fetch(`${API_URL}/analyze`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      url,
      device_id: deviceId
    })
  });

  const data = await res.json();

  document.getElementById("resultSection").style.display = "block";

  document.getElementById("summaryText").innerText = data.summary;
  
  renderCharts(data);
  renderReviewTable(data.reviews);

  showTab("summary");
  await loadHistory();
}

async function openHistoryItem(id) {
  if (!id) {
    console.error("Missing session id:", id);
    return;
  }

  const res = await fetch(`/api/proxy_history_detail?id=${id}`);
  const data = await res.json();

  goToDetailPage();

  document.getElementById("detailTitle").innerText = data.product_name;

  const link = document.getElementById("detailLink");
  link.href = data.url;
  link.innerText = data.url;

  document.getElementById("summaryTextDetail").innerText = data.summary;
  
  renderCharts(data, "detail");
  renderReviewTable(data.reviews, "detail");

  showTab("summary", "detail");
}

function renderCharts(data, mode = "main") {

  const sentiment = data.sentiment_distribution || {};
  const sData = [
    sentiment["Positive"] || 0,
    sentiment["Negative"] || 0,
    sentiment["Neutral/Mixed"] || 0
  ];

  const sentimentCanvas = mode === "detail"
    ? document.getElementById('sentimentChartDetail')
    : document.getElementById('sentimentChart');

  const authCanvas = mode === "detail"
    ? document.getElementById('authChartDetail')
    : document.getElementById('authChart');

  if (sentimentChart) sentimentChart.destroy();

  sentimentChart = new Chart(sentimentCanvas, {
    type: 'pie',
    data: {
      labels: ['Positive', 'Negative', 'Neutral/Mixed'],
      datasets: [{ data: sData }]
    }
  });

  const spam = data.spam_count || 0;
  const inauth = data.inauthentic_count || 0;
  const authentic = data.total_reviews - spam - inauth;

  if (authChart) authChart.destroy();

  authChart = new Chart(authCanvas, {
    type: 'bar',
    data: {
      labels: ['Spam', 'Inauthentic', 'Authentic'],
      datasets: [{
        label: 'Review Count',
        data: [spam, inauth, authentic]
      }]
    }
  });
}

function renderReviewTable(reviews, mode = "main") {
  const container = mode === "detail"
    ? document.getElementById("reviewSectionDetail")
    : document.getElementById("reviewSection");
  
  if (!reviews || reviews.length === 0) {
    container.innerHTML = "No review data.";
    return;
  }

  let html = `
    <h3>Review Details</h3>
    <table>
      <thead>
        <tr>
          <th>Review</th>
          <th>Rate</th>
          <th>Sentiment</th>
          <th>Authenticity</th>
        </tr>
      </thead>
      <tbody>
  `;

  reviews.forEach(r => {
    html += `
      <tr>
        <td>${r.comment || ""}</td>
        <td>${r.rating || "-"}</td>
        <td>${r.sentiment || "-"}</td>
        <td>${r.inauthentic ? "Inauthentic" : "Authentic"}</td>
      </tr>
    `;
  });

  html += "</tbody></table>";

  container.innerHTML = html;
}
</script>

</body>
</html>
