<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shopee Review Analyzer</title>

  <style>
    body {
      font-family: system-ui;
      padding: 16px;
      max-width: 700px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
    }

    .card {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .tab {
      margin-top: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #ccc;
      text-align: left;
    }

    th {
      background: #ddd;
    }

    #loadingText {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="mainPage">
  <h2>Shopee Review Analyzer</h2>

  <input id="url" placeholder="Paste Shopee URL">
  <button onclick="analyze()">Analyze Reviews</button>
  
  <div id="resultSection" style="display:none; margin-top:20px;">
  
    <!-- HIDDEN UNTIL DONE -->
    <div id="tabs" style="display:none;">
      <button onclick="showTab('sentiment')">Sentiment</button>
      <button onclick="showTab('authenticity')">Authenticity</button>
      <button onclick="showTab('summary')">AI Summary</button>
    </div>

    <!-- LOADING STATE -->
    <div id="loadingText"></div>
  
    <div id="sentiment" class="tab">
      <canvas id="sentimentChart"></canvas>
    </div>
  
    <div id="authenticity" class="tab" style="display:none;">
      <canvas id="authChart"></canvas>
    </div>
  
    <div id="summary" class="tab" style="display:none;">
      <div id="summaryText"></div>
    </div>
  
    <div id="reviewSection"></div>
  </div>
  
  <button onclick="loadHistory()">View History</button>
  <div id="history"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const API_URL = "https://flummoxedly-summerly-tenisha.ngrok-free.dev";

let deviceId = localStorage.getItem("device_id");
if (!deviceId) {
  deviceId = crypto.randomUUID();
  localStorage.setItem("device_id", deviceId);
}

let sentimentChart, authChart;

function showTab(tab) {
  ["sentiment", "authenticity", "summary"].forEach(id => {
    document.getElementById(id).style.display = "none";
  });

  document.getElementById(tab).style.display = "block";
}

async function analyze() {
  const url = document.getElementById('url').value;

  const res = await fetch(`${API_URL}/analyze`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      url,
      device_id: deviceId
    })
  });

  const data = await res.json();
  const jobId = data.job_id;

  // SHOW LOADING ONLY
  document.getElementById("resultSection").style.display = "block";
  document.getElementById("tabs").style.display = "none";
  document.getElementById("loadingText").innerText = "Processing... please wait.";

  document.getElementById("reviewSection").innerHTML = "";
  
  pollUntilDone(jobId);
}

async function pollUntilDone(jobId) {
  const interval = setInterval(async () => {

    const res = await fetch(`${API_URL}/status?job_id=${jobId}`);
    const data = await res.json();

    if (data.status === "done") {
      clearInterval(interval);

      const result = data.result;

      // SHOW RESULTS NOW
      document.getElementById("loadingText").innerText = "";
      document.getElementById("tabs").style.display = "block";

      document.getElementById("summaryText").innerText = result.summary;

      renderCharts(result);
      renderReviewTable(result.reviews);

      showTab("summary");
      await loadHistory();
    }

    else if (data.status === "error") {
      clearInterval(interval);
      document.getElementById("loadingText").innerText = "Error processing request.";
    }

  }, 3000);
}

function renderCharts(data) {
  const sentiment = data.sentiment_distribution || {};
  const sData = [
    sentiment["Positive"] || 0,
    sentiment["Negative"] || 0,
    sentiment["Neutral/Mixed"] || 0
  ];

  if (sentimentChart) sentimentChart.destroy();

  sentimentChart = new Chart(document.getElementById('sentimentChart'), {
    type: 'pie',
    data: {
      labels: ['Positive', 'Negative', 'Neutral/Mixed'],
      datasets: [{ data: sData }]
    }
  });

  const spam = data.spam_count || 0;
  const inauth = data.inauthentic_count || 0;
  const authentic = data.total_reviews - spam - inauth;

  if (authChart) authChart.destroy();

  authChart = new Chart(document.getElementById('authChart'), {
    type: 'bar',
    data: {
      labels: ['Spam', 'Inauthentic', 'Authentic'],
      datasets: [{
        label: 'Review Count',
        data: [spam, inauth, authentic]
      }]
    }
  });
}

function renderReviewTable(reviews) {
  const container = document.getElementById("reviewSection");
  
  if (!reviews || reviews.length === 0) {
    container.innerHTML = "No review data.";
    return;
  }

  let html = `
    <h3>Review Details</h3>
    <table>
      <thead>
        <tr>
          <th>Review</th>
          <th>Rate</th>
          <th>Sentiment</th>
          <th>Authenticity</th>
        </tr>
      </thead>
      <tbody>
  `;

  reviews.forEach(r => {
    html += `
      <tr>
        <td>${r.comment || ""}</td>
        <td>${r.rating || "-"}</td>
        <td>${r.sentiment || "-"}</td>
        <td>${r.inauthentic ? "Inauthentic" : "Authentic"}</td>
      </tr>
    `;
  });

  html += "</tbody></table>";

  container.innerHTML = html;
}

async function loadHistory() {
  const container = document.getElementById("history");
  container.innerHTML = "Loading...";

  try {
    const res = await fetch(`/api/proxy_history?device_id=${deviceId}`);
    const data = await res.json();

    if (!data.length) {
      container.innerHTML = "No history found.";
      return;
    }

    container.innerHTML = "<h3>History</h3>";

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${item.product_name || "Unknown Product"}</b><br>
        Dominant: ${item.dominant_type} | Reviews: ${item.total_reviews}<br>
        <small>${new Date(item.timestamp).toLocaleString()}</small>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    container.innerHTML = "Failed to load history.";
  }
}
</script>

</body>
</html>
